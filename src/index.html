<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>huanhuan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* WKWebView 中 button 默认系统外观会覆盖自定义样式，必须全局重置 */
    button { -webkit-appearance: none !important; appearance: none !important; }

    /* 气泡内操作按钮：白色半透明圆形，用 !important 防止 WKWebView UA 样式覆盖 */
    #copy-btn, #voice-btn {
      -webkit-appearance: none !important;
      appearance: none !important;
      width: 18px !important;
      height: 18px !important;
      min-width: 18px !important;
      min-height: 18px !important;
      padding: 0 !important;
      margin: 0 !important;
      background: rgba(255,255,255,0.25) !important;
      border: none !important;
      border-radius: 50% !important;
      color: #fff !important;
      font-size: 11px !important;
      line-height: 18px !important;
      text-align: center !important;
      cursor: pointer !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      flex-shrink: 0 !important;
      box-shadow: none !important;
      outline: none !important;
    }
    #voice-btn { margin-left: 6px !important; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: visible; /* fixed: overflow:hidden 在 WKWebView 会裁切 position:fixed 元素 */
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* 隐藏滚动条（替代 overflow:hidden） */
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    /* ── 根容器：垂直排列 ── */
    #app {
      width: 450px;
      height: 600px;
      display: flex;
      flex-direction: column;
      cursor: grab;
      position: relative;
      overflow: hidden;
    }

    #app:active { cursor: grabbing; }

    /* ── 输入框：底部（默认隐藏） ── */
    #input-wrap {
      display: none;
      flex-shrink: 0;
      padding: 0 40px 0 10px;
      margin-top: -80px;
      position: relative;
    }
    #input-wrap.visible {
      display: flex;
    }

    /* 输入框工具栏（浮在右侧） */
    #input-wrap .input-toolbar {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
      align-items: center;
      pointer-events: auto;
    }

    #input-wrap .input-toolbar button {
      width: 22px;
      height: 22px;
      padding: 0;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      line-height: 22px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #input-wrap .input-toolbar button:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    #msg-input {
      width: 100%;
      height: auto;
      min-height: 36px;
      max-height: 150px;
      background: rgba(20, 20, 20, 0.85);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 70px 8px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-sizing: border-box;
    }

    #msg-input::placeholder { color: rgba(255, 255, 255, 0.4); }

    /* ── 附件角标：悬浮在输入框右上角，不占布局空间 ── */
    #attachment-chips {
      display: none;
      position: absolute;
      top: 5px;
      right: 52px;          /* 留出右侧工具栏按钮的位置 */
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      max-width: 200px;
      z-index: 10;
      pointer-events: auto;
    }
    #attachment-chips.has-items { display: flex; }

    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 10px;
      padding: 2px 7px 2px 5px;
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      max-width: 130px;
      overflow: hidden;
    }
    .attachment-chip .chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .attachment-chip .chip-remove {
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      opacity: 0.6;
      flex-shrink: 0;
      margin-left: 1px;
    }
    .attachment-chip .chip-remove:hover { opacity: 1; }

    /* ── 头像：中间，固定大小 ── */
    #avatar-wrap {
      width: 400px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 150px;
    }

    #avatar {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      display: block;
    }

    /* ── 气泡：position:fixed，JS 持续修正 top，向上增长 ── */
    #bubble {
      display: none;
      position: fixed;
      top: 50px;
      left: 5px;
      width: 260px;
      height: auto;
      max-height: 200px;
      padding: 12px 14px;
      background: rgba(20, 20, 20, 0.85);
      border-radius: 12px;
      overflow-x: hidden;
      overflow-y: auto;
      z-index: 100;
      cursor: grab;
      user-select: none;
    }
    #bubble:active { cursor: grabbing; }

    /* 小丽特殊样式 */
    #bubble.bubble-xiaoli {
      background: linear-gradient(135deg, rgba(100, 150, 200, 0.9), rgba(120, 100, 200, 0.9));
      border-radius: 16px;
    }

    #bubble.bubble-xiaoli #bubble-text {
      color: #fff;
      font-weight: 500;
    }

    #bubble.showing {
      display: block;
    }

    #bubble::-webkit-scrollbar {
      width: 4px;
    }

    #bubble::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
    }

    #bubble-text {
      font-size: 14px;
      line-height: 1.6;
      color: #fff;
      word-break: break-word;
      white-space: pre-wrap;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bubbleOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    #bubble.entering { animation: bubbleIn 200ms ease forwards; }
    #bubble.leaving  { animation: bubbleOut 300ms ease forwards; }

    /* ── 右键菜单 ── */
    #context-menu {
      display: none;
      position: fixed;
      background: rgba(30, 30, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 4px;
      z-index: 9999;
      backdrop-filter: blur(10px);
      min-width: 100px;
    }

    #context-menu.visible { display: block; }

    #context-menu button {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      border-radius: 5px;
      font-family: inherit;
    }

    #context-menu button:hover { background: rgba(255, 255, 255, 0.12); }

    /* ── 人物切换子菜单 ── */
    #character-submenu {
      position: fixed;
      display: none;
      background: rgba(30, 30, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 4px;
      z-index: 10000;
      backdrop-filter: blur(10px);
      min-width: 100px;
    }

    #character-submenu.visible { display: block; }

    #character-submenu button {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      border-radius: 5px;
      font-family: inherit;
      white-space: nowrap;
    }

    #character-submenu button:hover { background: rgba(255, 255, 255, 0.12); }
  </style>
</head>
<body>
  <!-- 气泡：移到 #app 外，避免被 overflow:hidden 裁切 -->
  <div id="bubble">
    <div style="display: flex; gap: 6px; align-items: flex-end;">
      <span id="bubble-text" style="flex: 1;"></span>
      <div id="bubble-actions" style="display: none; flex-direction: row; flex-shrink: 0; align-items: center;">
        <button id="copy-btn" title="复制">●</button>
        <button id="voice-btn" title="语音">🔊</button>
      </div>
    </div>
  </div>

  <div id="app">
    <!-- 头像：中间 -->
    <div id="avatar-wrap">
      <canvas id="avatar" draggable="false"></canvas>
    </div>

    <!-- 输入框：图片正下方（默认隐藏） -->
    <div id="input-wrap">
      <textarea id="msg-input" placeholder="和欢欢说..." autocomplete="off"></textarea>
      <!-- 附件角标：悬浮在输入框右上角 -->
      <div id="attachment-chips"></div>
      <!-- 输入框工具栏（浮在右侧） -->
      <div class="input-toolbar">
        <button id="voice-input-btn" title="语音输入">🎤</button>
        <button id="file-btn" title="上传文件">📎</button>
      </div>
    </div>
  </div>

  <!-- 右键菜单 -->
  <div id="context-menu">
    <button id="settings-btn">设置</button>
    <button id="switch-character-btn">切换人物</button>
    <button id="debug-btn">调试</button>
    <button id="quit-btn">退出</button>
  </div>

  <!-- 人物切换子菜单 -->
  <div id="character-submenu"></div>

  <script src="main.js"></script>
</body>
</html>
