<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>huanhuan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── 根容器：垂直排列 ── */
    #app {
      width: 450px;
      height: 600px;
      display: flex;
      flex-direction: column;
      cursor: grab;
      position: relative;
      overflow: hidden;
    }

    #app:active { cursor: grabbing; }

    /* ── 输入框：底部（默认隐藏） ── */
    #input-wrap {
      display: none;
      flex-shrink: 0;
      padding: 0 40px 0 10px;
      margin-top: -80px;
      position: relative;
    }
    #input-wrap.visible {
      display: flex;
    }

    /* 输入框工具栏（浮在右侧） */
    #input-wrap .input-toolbar {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
      align-items: center;
      pointer-events: auto;
    }

    #input-wrap .input-toolbar button {
      width: 22px;
      height: 22px;
      padding: 0;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      line-height: 22px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #input-wrap .input-toolbar button:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    #msg-input {
      width: 100%;
      height: auto;
      min-height: 36px;
      max-height: 150px;
      background: rgba(20, 20, 20, 0.85);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 70px 8px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-sizing: border-box;
    }

    #msg-input::placeholder { color: rgba(255, 255, 255, 0.4); }

    /* ── 头像：中间，固定大小 ── */
    #avatar-wrap {
      width: 400px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 150px;
    }

    #avatar {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      display: block;
    }

    /* ── 气泡：浮动，从底部向上增长 ── */
    #bubble {
      display: none;
      position: absolute;
      top: 180px;
      left: 5px;
      right: 35px;
      height: auto;
      padding: 12px 14px;
      background: rgba(20, 20, 20, 0.85);
      border-radius: 12px;
      overflow-x: hidden;
      z-index: 100;
    }

    #bubble.showing {
      display: block;
    }

    #bubble::-webkit-scrollbar {
      width: 4px;
    }

    #bubble::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
    }

    #bubble-text {
      font-size: 14px;
      line-height: 1.6;
      color: #fff;
      word-break: break-word;
      white-space: pre-wrap;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bubbleOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    #bubble.entering { animation: bubbleIn 200ms ease forwards; }
    #bubble.leaving  { animation: bubbleOut 300ms ease forwards; }

    /* ── 右键菜单 ── */
    #context-menu {
      display: none;
      position: fixed;
      background: rgba(30, 30, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 4px;
      z-index: 9999;
      backdrop-filter: blur(10px);
      min-width: 100px;
    }

    #context-menu.visible { display: block; }

    #context-menu button {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      border-radius: 5px;
      font-family: inherit;
    }

    #context-menu button:hover { background: rgba(255, 255, 255, 0.12); }
  </style>
</head>
<body>
  <div id="app">
    <!-- 气泡：图片正上方 -->
    <div id="bubble">
      <div style="display: flex; gap: 6px; justify-content: space-between; align-items: flex-end; flex-direction: row-reverse;">
        <div style="display: flex; flex-direction: row; gap: 6px; flex-shrink: 0;">
          <button id="copy-btn" style="display: none; width: 18px; height: 18px; padding: 0; background: rgba(255, 255, 255, 0.2); border: none; border-radius: 50%; color: #fff; font-size: 11px; cursor: pointer; line-height: 18px; text-align: center;" title="复制">●</button>
          <button id="voice-btn" style="display: none; width: 18px; height: 18px; padding: 0; background: rgba(255, 255, 255, 0.2); border: none; border-radius: 50%; color: #fff; font-size: 11px; cursor: pointer; line-height: 18px; text-align: center;" title="语音">🔊</button>
        </div>
        <span id="bubble-text" style="flex: 1;"></span>
      </div>
    </div>

    <!-- 头像：中间 -->
    <div id="avatar-wrap">
      <canvas id="avatar" draggable="false"></canvas>
    </div>

    <!-- 输入框：图片正下方（默认隐藏） -->
    <div id="input-wrap">
      <textarea id="msg-input" placeholder="和欢欢说..." autocomplete="off"></textarea>
      <!-- 输入框工具栏（浮在右侧） -->
      <div class="input-toolbar">
        <button id="voice-input-btn" title="语音输入">🎤</button>
        <button id="file-btn" title="上传文件">📎</button>
      </div>
    </div>
  </div>

  <!-- 右键菜单 -->
  <div id="context-menu">
    <button id="settings-btn">设置</button>
    <button id="debug-btn">🐛 调试日志 (OFF)</button>
    <button id="quit-btn">退出</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
